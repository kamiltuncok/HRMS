# -----------------------------------------------------------------------------
# Example configuration template.
#
# Copy this file to `application.properties` (which is git-ignored) and fill in
# your local values, OR provide the values below as environment variables.
# Each ${ENV_VAR:default} reads ENV_VAR from the environment and falls back to
# the default after the colon when the variable is not set.
# -----------------------------------------------------------------------------

spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.show-sql=true

# Database ---------------------------------------------------------------------
# Required env: DB_PASSWORD   (optional: DB_URL, DB_USERNAME)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/HRMS}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:changeme}
spring.jpa.properties.jakarta.persistence.validation.mode = none
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# Flyway -----------------------------------------------------------------------
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false

# JWT --------------------------------------------------------------------------
# Required env: JWT_SECRET  — a Base64/hex string, at least 256 bits (32 bytes).
# Generate one, e.g.:  openssl rand -hex 32
application.security.jwt.secret-key=${JWT_SECRET:replace-with-a-strong-256-bit-secret}
application.security.jwt.expiration=86400000
logging.level.org.springframework.web=DEBUG

# File Upload ------------------------------------------------------------------
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Mail (SMTP) ------------------------------------------------------------------
# Required env: MAIL_USERNAME, MAIL_PASSWORD  (for password-reset emails).
# For Gmail, MAIL_PASSWORD must be an App Password, not the account password.
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:you@example.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Frontend URL (used to build password-reset links in emails) ------------------
app.frontend-url=${FRONTEND_URL:http://localhost:5173}
